<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบจัดการคลาสเรียน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { background-color: #f8fafc; padding-bottom: 80px; /* เว้นที่ให้เมนูด้านล่าง */ }
  </style>
</head>
<body class="font-sans text-slate-800 p-4 pb-24">

  <!-- Loading State -->
  <div id="loading" class="fixed inset-0 bg-white/90 z-50 flex items-center justify-center">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <!-- Header & Profile -->
  <div class="max-w-md mx-auto mb-6 flex items-center space-x-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
    <img id="profileImage" src="" alt="Profile" class="w-14 h-14 rounded-full border-2 border-blue-100 object-cover hidden">
    <div>
      <h1 class="text-xl font-bold text-slate-900 tracking-tight">Class <span class="text-blue-600">Booking</span></h1>
      <p id="profileName" class="text-sm text-slate-500 mt-0.5">กำลังโหลดข้อมูล...</p>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- TAB 1: จองคลาสเรียน (HOME) -->
  <!-- ========================================== -->
  
  <!-- VIEW: หมวดหมู่วัน (Day List) -->
  <div id="dayListView" class="max-w-md mx-auto hidden">
    <h2 class="text-base font-bold text-slate-800 mb-3 px-1">เลือกวันที่ต้องการเรียน</h2>
    <div id="dayContainer" class="grid grid-cols-2 gap-3"></div>
  </div>

  <!-- VIEW: Class List (แสดงคลาสของวันที่เลือก) -->
  <div id="classListView" class="max-w-md mx-auto hidden">
    <div class="flex items-center mb-4 px-1">
      <button onclick="backToDayList()" class="flex items-center text-blue-600 text-sm font-medium hover:text-blue-800 transition mr-3 bg-blue-50 px-3 py-1.5 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        กลับ
      </button>
      <h2 id="selectedDayTitle" class="text-base font-bold text-slate-800"></h2>
    </div>
    <div id="classContainer" class="space-y-4"></div>
  </div>

  <!-- ฟอร์มจอง (มี Auto-fill) -->
  <div id="bookingForm" class="max-w-md mx-auto mt-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden relative overflow-hidden">
    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-lg text-slate-800">ยืนยันการจอง</h3>
      <button onclick="closeForm()" class="text-slate-400 hover:text-red-500 p-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
    </div>
    <p id="selectedClassText" class="text-sm text-blue-600 font-medium mb-4 bg-blue-50 p-2 rounded-lg"></p>
    <input type="hidden" id="selectedClassId">
    
    <input type="text" id="name" placeholder="ชื่อ - นามสกุล" class="w-full mb-3 px-4 py-3 bg-slate-50 border-transparent rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
    <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์ติดต่อ" class="w-full mb-4 px-4 py-3 bg-slate-50 border-transparent rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
    
    <label class="flex items-start space-x-3 cursor-pointer p-4 bg-slate-50 rounded-xl border border-slate-200 hover:bg-blue-50 transition">
      <input type="checkbox" id="consentCheck" onchange="submitNewBooking()" class="mt-0.5 w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
      <span class="text-sm text-slate-600 leading-tight">ตรวจสอบข้อมูลเรียบร้อยแล้ว <span class="font-bold text-blue-700">ยืนยันการจอง</span></span>
    </label>
  </div>

  <!-- ========================================== -->
  <!-- TAB 2: การจองของฉัน (MY BOOKINGS) -->
  <!-- ========================================== -->

  <!-- VIEW: Dashboard สรุปรายการจองทั้งหมด -->
  <div id="myBookingsListView" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4 px-1">
      <h2 class="text-lg font-bold text-slate-800">คลาสเรียนของคุณ</h2>
      <span id="bookingCountBadge" class="bg-blue-100 text-blue-700 text-xs px-2.5 py-1 rounded-full font-bold"></span>
    </div>
    <div id="bookingsContainer" class="space-y-3">
      <!-- รายการจองจะถูกสร้างที่นี่ -->
    </div>
    <div id="emptyBookingMsg" class="hidden text-center py-10">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
      <p class="text-slate-500 text-sm">คุณยังไม่มีการจองคลาสเรียน</p>
    </div>
  </div>

  <!-- VIEW: รายละเอียดการจองแต่ละคลาส -->
  <div id="myBookingDetailView" class="max-w-md mx-auto hidden">
    <button onclick="backToDashboard()" class="mb-4 text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg flex items-center hover:bg-blue-100 w-fit">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
      กลับหน้ารวม
    </button>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
      <div class="h-1 w-full bg-gradient-to-r from-blue-500 to-red-500"></div>
      <div class="p-6">
        <div class="flex justify-between items-start mb-4">
          <h2 class="text-lg font-bold text-slate-800">รายละเอียดการจอง</h2>
          <span id="bookingStatus" class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700">รอชำระเงิน</span>
        </div>
        
        <div class="space-y-3 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
          <p class="text-sm"><span class="text-slate-500 block text-xs">คลาสเรียน</span> <span id="bClassName" class="font-semibold text-blue-700"></span></p>
          <div class="flex gap-4">
            <p class="text-sm"><span class="text-slate-500 block text-xs">วันที่</span> <span id="bDate" class="font-medium"></span></p>
            <p class="text-sm"><span class="text-slate-500 block text-xs">เวลา</span> <span id="bTime" class="font-medium"></span></p>
          </div>
        </div>

        <div id="editForm" class="hidden space-y-3 mb-4">
          <input type="text" id="editName" class="w-full px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="ชื่อ-สกุล">
          <input type="tel" id="editPhone" class="w-full px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="เบอร์โทร">
          <button onclick="saveEdit()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium">บันทึกข้อมูล</button>
        </div>

        <div class="flex gap-2">
          <button id="btnEdit" onclick="toggleEdit()" class="flex-1 bg-white border border-slate-300 text-slate-700 py-2 rounded-lg text-sm font-medium hover:bg-slate-50">แก้ไขข้อมูล</button>
          <button id="btnCancel" onclick="cancelBooking()" class="flex-1 bg-red-50 text-red-600 py-2 rounded-lg text-sm font-medium hover:bg-red-100">ยกเลิก</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- BOTTOM NAVIGATION BAR (เมนูด้านล่างแบบติดหนึบ) -->
  <!-- ========================================== -->
  <div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 pb-safe z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
    <div class="flex justify-around items-center h-16 max-w-md mx-auto px-4">
      <!-- ปุ่ม Tab 1: จองคลาส -->
      <button id="tab-home" onclick="switchTab('home')" class="flex flex-col items-center justify-center w-full h-full text-blue-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        <span class="text-[10px] font-bold">จองคลาส</span>
      </button>

      <!-- ปุ่ม Tab 2: การจองของฉัน -->
      <button id="tab-mybookings" onclick="switchTab('mybookings')" class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 transition relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
        <span class="text-[10px] font-bold">การจองของฉัน</span>
        <!-- แบดจ์แจ้งเตือนจำนวนการจอง (โชว์จุดแดงเวลามีคลาส) -->
        <span id="navBadge" class="absolute top-1.5 right-6 bg-red-500 w-2.5 h-2.5 rounded-full hidden border border-white"></span>
      </button>
    </div>
  </div>

  <script>
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbywdBJxTfFqr4f311o2L7fhywrmKVzC4HLDNzOFU3fLCLsqNyhwmRBBx4l49MFqSdjA/exec"; 
    const LIFF_ID = "2009934915-533SfMV4"; 
    // ==========================================

    let userUid = "";
    let currentBookingId = "";
    let allClassData = []; 
    let myBookingsData = []; 
    let savedName = "";
    let savedPhone = "";

    async function main() {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userUid = profile.userId;
        
        document.getElementById('profileName').innerText = `สวัสดีคุณ ${profile.displayName}`;
        const profileImg = document.getElementById('profileImage');
        profileImg.src = profile.pictureUrl || "https://cdn-icons-png.flaticon.com/512/847/847969.png"; 
        profileImg.classList.remove('hidden');
        
        fetchData(); 
      } else {
        liff.login();
      }
    }

    // ฟังก์ชันสลับเมนูด้านล่าง
    function switchTab(tabName) {
      // ซ่อนทุกหน้าต่างก่อน
      document.getElementById('dayListView').classList.add('hidden');
      document.getElementById('classListView').classList.add('hidden');
      document.getElementById('bookingForm').classList.add('hidden');
      document.getElementById('myBookingsListView').classList.add('hidden');
      document.getElementById('myBookingDetailView').classList.add('hidden');

      // อัปเดตสีเมนู
      const tabHome = document.getElementById('tab-home');
      const tabMyBookings = document.getElementById('tab-mybookings');

      if (tabName === 'home') {
        tabHome.className = "flex flex-col items-center justify-center w-full h-full text-blue-600 transition";
        tabMyBookings.className = "flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 transition relative";
        renderDayList(); // โชว์หน้าเลือกวัน
      } else if (tabName === 'mybookings') {
        tabHome.className = "flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 transition";
        tabMyBookings.className = "flex flex-col items-center justify-center w-full h-full text-blue-600 transition relative";
        renderDashboard(); // โชว์หน้าสรุปการจอง
      }
    }

    async function fetchData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        const response = await fetch(`${GAS_URL}?uid=${userUid}`);
        const data = await response.json();
        
        allClassData = data.classes; 
        myBookingsData = data.bookings; 

        // จัดการแจ้งเตือนและ Auto-fill
        if (myBookingsData && myBookingsData.length > 0) {
          savedName = myBookingsData[0].name;
          savedPhone = myBookingsData[0].phone;
          document.getElementById('navBadge').classList.remove('hidden'); // โชว์จุดแดง
        } else {
          savedName = ""; savedPhone = "";
          document.getElementById('navBadge').classList.add('hidden'); // ซ่อนจุดแดง
        }

        // เริ่มต้นให้แสดงหน้าจองคลาส (Home Tab)
        switchTab('home');

      } catch (error) {
        alert("ไม่สามารถดึงข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
      }
      document.getElementById('loading').style.display = 'none';
    }

    // ------------------------------------
    // ฟังก์ชันของ Tab 1: จองคลาสเรียน
    // ------------------------------------
    function renderDayList() {
      document.getElementById('dayListView').classList.remove('hidden');
      const uniqueDays = [...new Set(allClassData.map(c => c.date))];
      let html = '';
      uniqueDays.forEach(day => {
        const classCount = allClassData.filter(c => c.date === day).length;
        html += `
          <div onclick="showClassesForDay('${day}')" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center cursor-pointer active:scale-95 hover:border-blue-400 transition-all">
            <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center mb-2 text-blue-600">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            </div>
            <span class="text-sm font-bold text-slate-800">${day}</span>
            <span class="text-xs text-slate-500 mt-1">${classCount} คลาสเรียน</span>
          </div>
        `;
      });
      document.getElementById('dayContainer').innerHTML = html;
    }

    function showClassesForDay(selectedDay) {
      document.getElementById('dayListView').classList.add('hidden');
      document.getElementById('classListView').classList.remove('hidden');
      document.getElementById('selectedDayTitle').innerText = `วัน${selectedDay}`;

      const filteredClasses = allClassData.filter(c => c.date === selectedDay);
      let html = '';
      filteredClasses.forEach(c => {
        const isFull = parseInt(c.remaining) <= 0;
        const isAlreadyBooked = myBookingsData.some(b => b.className === c.className);

        html += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden">
            <span class="absolute top-5 right-5 text-xs font-bold ${isFull ? 'text-red-500 bg-red-50' : 'text-blue-600 bg-blue-50'} px-2 py-1 rounded-md">
              ${isFull ? 'เต็มแล้ว' : `ว่าง ${c.remaining} ที่`}
            </span>
            <h2 class="text-lg font-bold text-slate-800 pr-16">${c.className}</h2>
            <p class="text-sm text-slate-500 mt-2 mb-4 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              ${c.time}
            </p>
            <button onclick="openForm('${c.classId}', '${c.className}', '${c.date}', '${c.time}')" 
              ${isFull || isAlreadyBooked ? 'disabled' : ''} 
              class="w-full flex justify-center items-center ${isAlreadyBooked ? 'bg-green-100 text-green-700 cursor-not-allowed' : isFull ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-sm'} py-2.5 rounded-xl text-sm font-medium transition">
              ${isAlreadyBooked ? 'คุณจองคลาสนี้แล้ว' : isFull ? 'คลาสเต็ม' : 'เลือกคลาสนี้'}
            </button>
          </div>
        `;
      });
      document.getElementById('classContainer').innerHTML = html;
    }

    function backToDayList() {
      document.getElementById('classListView').classList.add('hidden');
      document.getElementById('bookingForm').classList.add('hidden');
      document.getElementById('dayListView').classList.remove('hidden');
    }

    // ฟอร์มจอง + Auto-fill
    function openForm(classId, className, date, time) {
      document.getElementById('selectedClassId').value = classId;
      document.getElementById('selectedClassText').innerHTML = `<b>${className}</b><br><span class="text-xs text-blue-500">วัน${date} | ${time}</span>`;
      
      // Auto-fill ข้อมูลเดิม
      if (savedName) document.getElementById('name').value = savedName;
      if (savedPhone) document.getElementById('phone').value = savedPhone;

      document.getElementById('bookingForm').classList.remove('hidden');
      document.getElementById('consentCheck').checked = false;
      
      setTimeout(() => {
        document.getElementById('bookingForm').scrollIntoView({ behavior: 'smooth', block: 'end' });
      }, 100);
    }

    function closeForm() {
      document.getElementById('bookingForm').classList.add('hidden');
      document.getElementById('consentCheck').checked = false;
    }

    async function submitNewBooking() {
      const checkbox = document.getElementById('consentCheck');
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      
      if(checkbox.checked) {
        if(!name || !phone) {
          alert("กรุณากรอกข้อมูลให้ครบถ้วน"); checkbox.checked = false; return;
        }
        document.getElementById('loading').style.display = 'flex';
        const payload = { action: "book", uid: userUid, name, phone, classId: document.getElementById('selectedClassId').value };
        
        try {
          await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
          document.getElementById('name').value = '';
          document.getElementById('phone').value = '';
          document.getElementById('consentCheck').checked = false;
          
          // โหลดข้อมูลใหม่ และเด้งไปหน้า "การจองของฉัน" ทันทีเมื่อจองเสร็จ
          await fetchData(); 
          switchTab('mybookings');

        } catch (error) {
          alert("เกิดข้อผิดพลาด");
          document.getElementById('loading').style.display = 'none';
        }
      }
    }

    // ------------------------------------
    // ฟังก์ชันของ Tab 2: การจองของฉัน
    // ------------------------------------
    function renderDashboard() {
      document.getElementById('myBookingsListView').classList.remove('hidden');
      
      if(myBookingsData.length === 0) {
        document.getElementById('bookingCountBadge').classList.add('hidden');
        document.getElementById('bookingsContainer').innerHTML = '';
        document.getElementById('emptyBookingMsg').classList.remove('hidden');
        return;
      }

      document.getElementById('emptyBookingMsg').classList.add('hidden');
      document.getElementById('bookingCountBadge').classList.remove('hidden');
      document.getElementById('bookingCountBadge').innerText = `${myBookingsData.length} คลาส`;

      let html = '';
      myBookingsData.forEach(booking => {
        let statusColor = booking.status === "ชำระเงินแล้ว" || booking.status === "จองสำเร็จ" 
                        ? "bg-green-100 text-green-700" : "bg-yellow-100 text-yellow-700";
        
        html += `
          <div onclick="showBookingDetail('${booking.bookingId}')" class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center cursor-pointer hover:border-blue-300 transition group relative overflow-hidden">
            <div class="absolute left-0 top-0 w-1 h-full bg-blue-400"></div>
            <div>
              <h3 class="font-bold text-slate-800 text-sm">${booking.className}</h3>
              <p class="text-xs text-slate-500 mt-1">วัน${booking.date} | ${booking.time}</p>
            </div>
            <div class="flex items-center text-right">
              <span class="px-2 py-1 rounded-md text-[10px] font-bold ${statusColor} mr-3">${booking.status}</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300 group-hover:text-blue-500 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </div>
          </div>
        `;
      });
      document.getElementById('bookingsContainer').innerHTML = html;
    }

    function showBookingDetail(bookingId) {
      document.getElementById('myBookingsListView').classList.add('hidden');
      document.getElementById('myBookingDetailView').classList.remove('hidden');
      
      const booking = myBookingsData.find(b => b.bookingId === bookingId);
      if(!booking) return;

      currentBookingId = booking.bookingId;
      document.getElementById('bClassName').innerText = booking.className;
      document.getElementById('bDate').innerText = booking.date;
      document.getElementById('bTime').innerText = booking.time;
      document.getElementById('editName').value = booking.name;
      document.getElementById('editPhone').value = booking.phone;

      const statusBadge = document.getElementById('bookingStatus');
      statusBadge.innerText = booking.status;
      
      if(booking.status === "ชำระเงินแล้ว" || booking.status === "จองสำเร็จ") {
        statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700";
        document.getElementById('btnEdit').classList.add('hidden');
        document.getElementById('btnCancel').classList.add('hidden');
      } else {
        statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700";
        document.getElementById('btnEdit').classList.remove('hidden');
        document.getElementById('btnCancel').classList.remove('hidden');
      }
      document.getElementById('editForm').classList.add('hidden'); 
    }

    function backToDashboard() {
      document.getElementById('myBookingDetailView').classList.add('hidden');
      renderDashboard();
    }

    function toggleEdit() {
      document.getElementById('editForm').classList.toggle('hidden');
    }

    async function saveEdit() {
      const name = document.getElementById('editName').value;
      const phone = document.getElementById('editPhone').value;
      if(!name || !phone) return alert("กรุณากรอกข้อมูลให้ครบ");
      
      document.getElementById('loading').style.display = 'flex';
      await sendData({ action: "edit", bookingId: currentBookingId, name, phone });
    }

    async function cancelBooking() {
      if(confirm("คุณต้องการยกเลิกการจองนี้ใช่หรือไม่?")) {
        document.getElementById('loading').style.display = 'flex';
        await sendData({ action: "cancel", bookingId: currentBookingId });
      }
    }

    async function sendData(payload) {
      try {
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        await fetchData(); 
        
        // ถ้าเป็นการอัปเดตจากหน้าแก้ไข ให้พากลับไปหน้าแดชบอร์ด
        if(payload.action === 'edit' || payload.action === 'cancel') {
          switchTab('mybookings');
        }
      } catch (error) {
        alert("เกิดข้อผิดพลาด");
        document.getElementById('loading').style.display = 'none';
      }
    }

    main();
  </script>
</body>
</html>
