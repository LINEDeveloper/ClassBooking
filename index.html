<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการคลาสเรียน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { background-color: #f8fafc; }
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.6;
      transition: 0.2s;
    }
    input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }
    
    /* Custom Loader */
    .loader {
      width: 40px;
      aspect-ratio: 1.154;
      --_g: no-repeat radial-gradient(farthest-side, #2563eb 90%, #0000);
      background: 
        var(--_g) 50%  0,
        var(--_g) 0    100%,
        var(--_g) 100% 100%;
      background-size: 35% calc(35%*1.154);
      animation: l16 1s infinite;
    }
    @keyframes l16{ 
        50%,100% {background-position: 100% 100%,50% 0,0 100%} 
    }
  </style>
</head>
<body class="font-sans text-slate-800 p-4 pb-24"> 

  <!-- Loading State -->
  <div id="loading" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center">
    <div class="loader"></div>
  </div>

  <!-- Toast Notification -->
  <div id="toastMessage" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium transition-all duration-300 opacity-0 pointer-events-none z-[60] translate-y-[-20px]">
    ✓ บันทึกข้อมูลสำเร็จ
  </div>

  <!-- Header & Profile -->
  <div class="max-w-md md:max-w-xl mx-auto mb-6 flex items-center space-x-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
    <img id="profileImage" src="" alt="Profile" class="w-14 h-14 rounded-full border-2 border-blue-100 object-cover hidden">
    <div>
      <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-pink-500 to-red-500 text-transparent bg-clip-text">Yoka Booking</h1>
      <p id="profileName" class="text-sm text-slate-500 mt-0.5">กำลังโหลดข้อมูล...</p>
    </div>
  </div>

  <!-- VIEW 1: หมวดหมู่วัน (Day List) -->
  <div id="dayListView" class="max-w-md md:max-w-xl mx-auto hidden">
    <h2 class="text-base font-bold text-slate-800 mb-3 px-1">เลือกวันที่ต้องการเรียน</h2>
    <div id="dayContainer" class="grid grid-cols-2 gap-3 w-full"></div>
  </div>

  <!-- VIEW 2: Class List (แสดงคลาสของวันที่เลือก) -->
  <div id="classListView" class="max-w-md md:max-w-xl mx-auto hidden">
    <div class="flex items-center mb-4 px-1">
      <button onclick="backToDayList()" class="flex items-center text-blue-600 text-sm font-medium hover:text-blue-800 transition mr-3 bg-blue-50 px-3 py-1.5 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        กลับ
      </button>
      <h2 id="selectedDayTitle" class="text-base font-bold text-slate-800"></h2>
    </div>
    <div id="classContainer" class="space-y-4"></div>
  </div>

  <!-- VIEW 3: ฟอร์มจองแบบกรอกข้อมูลและเลือกวัน -->
  <div id="bookingForm" class="max-w-md md:max-w-xl mx-auto mt-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden relative overflow-hidden">
    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-lg text-slate-800">ข้อมูลสำหรับยืนยันการจอง</h3>
      <button onclick="closeForm()" class="text-slate-400 hover:text-red-500 p-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
    </div>
    
    <p id="selectedClassText" class="text-sm text-blue-600 font-medium mb-5 bg-blue-50 p-3 rounded-lg border border-blue-100"></p>
    <input type="hidden" id="selectedClassId">
    
    <div class="space-y-3 mb-5">
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1 ml-1">ชื่อ - นามสกุล</label>
        <input type="text" id="name" placeholder="ระบุชื่อ-สกุล" class="w-full px-4 py-3 bg-slate-50 border-transparent rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1 ml-1">เบอร์โทรศัพท์</label>
        <input type="tel" id="phone" placeholder="ระบุเบอร์ติดต่อ (เช่น 0812345678)" class="w-full px-4 py-3 bg-slate-50 border-transparent rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1 ml-1 text-blue-600">เลือกวันที่ต้องการเข้าเรียน (วัน/เดือน/ปี) *</label>
        <input type="date" id="bookingDate" class="w-full px-4 py-3 bg-slate-50 border border-blue-200 rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
      </div>
    </div>
    
    <label class="flex items-start space-x-3 cursor-pointer p-4 bg-slate-50 rounded-xl border border-slate-200 hover:bg-blue-50 transition">
      <input type="checkbox" id="consentCheck" onchange="submitNewBooking()" class="mt-0.5 w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
      <span class="text-sm text-slate-600 leading-tight">ข้าพเจ้าตรวจสอบข้อมูลเรียบร้อยแล้ว <span class="font-bold text-blue-700">ยืนยันการจองทันที</span></span>
    </label>
  </div>

  <!-- VIEW 4: My Booking (แสดงข้อมูลการจองปัจจุบัน) -->
  <div id="myBookingView" class="max-w-md md:max-w-xl mx-auto hidden">
    
    <!-- กรณีไม่มีการจอง -->
    <div id="emptyBookingState" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center hidden">
      <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
      </div>
      <h2 class="text-lg font-bold text-slate-800 mb-1">ยังไม่มีการจองคลาส</h2>
      <p class="text-sm text-slate-500 mb-5">คุณยังไม่ได้ทำรายการจองคลาสเรียนในขณะนี้</p>
      <button onclick="switchTab('home')" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700 transition">
        ไปเลือกคลาสเรียนกันเลย
      </button>
    </div>

    <!-- กรณีมีการจอง > 1 คลาส (หน้ารวม List View) -->
    <div id="myBookingsListState" class="hidden">
      <div class="flex justify-between items-center mb-4 px-1">
        <h2 class="text-lg font-bold text-slate-800">คลาสเรียนของคุณ</h2>
        <span id="bookingCountBadge" class="bg-blue-100 text-blue-700 text-xs px-2.5 py-1 rounded-full font-bold"></span>
      </div>
      <div id="bookingsContainer" class="space-y-3"></div>
    </div>

    <!-- กรณีดูรายละเอียดการจอง (Detail View) -->
    <div id="detailViewWrapper" class="hidden">
      <!-- ปุ่มกลับหน้ารวม -->
      <button id="btnBackToListContainer" onclick="showBookingsList()" class="mb-4 text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg flex items-center hover:bg-blue-100 w-fit hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        กลับหน้ารวม
      </button>

      <div id="activeBookingState" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
        <div class="h-1 w-full bg-gradient-to-r from-blue-500 to-red-500"></div>
        <div class="p-6">
          
          <div class="flex justify-between items-center mb-5 pb-4 border-b border-slate-100">
            <h2 class="text-lg font-bold text-slate-800">การจองของคุณ</h2>
            <button id="btnEdit" onclick="toggleEdit()" class="text-sm font-medium text-blue-600 hover:text-blue-800 flex items-center bg-blue-50 px-3 py-1.5 rounded-lg transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
              แก้ไขข้อมูล
            </button>
          </div>
          
          <div id="editForm" class="hidden space-y-4 mb-5 p-5 bg-blue-50 rounded-xl border border-blue-100">
            <p class="text-sm font-bold text-blue-800 border-b border-blue-200 pb-2">แก้ไขข้อมูลการจอง</p>
            
            <div class="space-y-3">
              <div>
                <label class="block text-[10px] font-bold text-blue-700 uppercase tracking-wide mb-1 ml-1">ชื่อ-สกุล</label>
                <input type="text" id="editName" class="w-full px-4 py-2 bg-white border border-blue-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="ชื่อ-สกุล">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-blue-700 uppercase tracking-wide mb-1 ml-1">เบอร์โทร</label>
                <input type="tel" id="editPhone" class="w-full px-4 py-2 bg-white border border-blue-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="เบอร์โทร">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-blue-700 uppercase tracking-wide mb-1 ml-1">เลือกตารางเรียน (วัน และ เวลา)</label>
                <select id="editClassSchedule" class="w-full px-4 py-2 bg-white border border-blue-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></select>
              </div>
              <div>
                <label class="block text-[10px] font-bold text-blue-700 uppercase tracking-wide mb-1 ml-1">วันที่เข้าเรียน (ปฏิทิน)</label>
                <input type="date" id="editBookingDate" class="w-full px-4 py-2 bg-white border border-blue-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
              </div>
            </div>

            <div class="flex gap-2 mt-4 pt-2">
              <button onclick="toggleEdit()" class="flex-1 bg-white border border-blue-200 text-slate-600 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-50 transition">ยกเลิก</button>
              <button onclick="saveEdit()" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition shadow-sm">บันทึกข้อมูล</button>
            </div>
          </div>

          <div class="space-y-4 mb-6 bg-slate-50 p-5 rounded-xl border border-slate-100">
            <div>
              <p class="text-xs text-slate-500 mb-0.5">ชื่อ-นามสกุล ผู้จอง</p>
              <p id="bName" class="text-sm font-semibold text-slate-800"></p>
            </div>
            <div>
              <p class="text-xs text-slate-500 mb-0.5">คลาสเรียน</p>
              <p id="bClassName" class="text-base font-bold text-blue-700"></p>
            </div>
            <div class="flex gap-6 border-t border-slate-200 pt-3 mt-1">
              <div>
                <p class="text-xs text-slate-500 mb-0.5">วันที่เรียน</p>
                <p id="bSpecificDate" class="text-sm font-medium text-blue-600"></p>
              </div>
              <div>
                <p class="text-xs text-slate-500 mb-0.5">เวลา</p>
                <p id="bTime" class="text-sm font-medium text-slate-800"></p>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-between border-t border-slate-100 pt-4 mt-2">
            <div>
              <p class="text-xs text-slate-500 mb-1">สถานะการทำรายการ</p>
              <span id="bookingStatus" class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700 inline-block">รอชำระเงิน</span>
            </div>
            <button id="btnCancel" onclick="cancelBooking()" class="text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg text-sm font-medium transition">
              ยกเลิกการจอง
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION BAR (จัดกึ่งกลางและปรับไอคอนแจ้งเตือนแดง) -->
  <div class="fixed bottom-0 left-0 right-0 mx-auto w-full max-w-md md:max-w-xl bg-white border-t border-slate-200 flex justify-around items-center pb-safe pt-2 px-2 shadow-[0_-10px_15px_rgba(0,0,0,0.03)] z-40">
    <button id="tabHome" onclick="switchTab('home')" class="flex-1 flex flex-col items-center p-2 text-blue-600 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      <span class="text-[10px] font-bold">เลือกคลาส</span>
    </button>
    <button id="tabBooking" onclick="switchTab('mybooking')" class="flex-1 flex flex-col items-center p-2 text-slate-400 hover:text-blue-500 transition-colors relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" /></svg>
      <span class="text-[10px] font-medium">การจองของฉัน</span>
      <!-- Badge แจ้งเตือน ใหญ่ขึ้นและอยู่ด้านบนไอคอนตรงๆ -->
      <span id="navBadge" class="absolute top-1 right-[calc(50%-16px)] bg-red-500 w-3.5 h-3.5 rounded-full hidden border-2 border-white"></span>
    </button>
  </div>

  <script>
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbywdBJxTfFqr4f311o2L7fhywrmKVzC4HLDNzOFU3fLCLsqNyhwmRBBx4l49MFqSdjA/exec"; 
    const LIFF_ID = "2009934915-533SfMV4"; 
    // ==========================================

    let userUid = "";
    let currentBookingId = "";
    let allClassData = []; 
    let myBookingData = null; 
    let myBookingsData = []; 

    // ตัวแปร Auto-Fill
    let savedName = "";
    let savedPhone = "";

    async function main() {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userUid = profile.userId;
        
        // กำหนดชื่อเริ่มต้นรอไว้ก่อน
        document.getElementById('profileName').innerText = `สวัสดีคุณ ${profile.displayName}`;
        
        const profileImg = document.getElementById('profileImage');
        profileImg.src = profile.pictureUrl || "https://cdn-icons-png.flaticon.com/512/847/847969.png"; 
        profileImg.classList.remove('hidden');
        
        fetchData(); 
      } else {
        liff.login();
      }
    }

    async function fetchData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        const response = await fetch(`${GAS_URL}?uid=${userUid}`);
        const data = await response.json();
        allClassData = data.classes; 
        
        let bookingsArr = [];
        if (data.bookings && data.bookings.length > 0) {
          bookingsArr = data.bookings;
        } else if (data.booking) {
          bookingsArr = [data.booking];
        }

        myBookingsData = bookingsArr;

        if (bookingsArr.length > 0) {
          savedName = bookingsArr[0].name;
          let cleanPhone = bookingsArr[0].phone ? bookingsArr[0].phone.replace(/'/g, "") : "";
          savedPhone = cleanPhone;
          
          // ดึงชื่อ นามสกุล จากระบบมาแสดงแทนชื่อไลน์
          document.getElementById('profileName').innerText = `สวัสดีคุณ ${savedName}`;
          
          document.getElementById('navBadge').classList.remove('hidden');
          switchTab('mybooking'); 
        } else {
          savedName = "";
          savedPhone = "";
          document.getElementById('navBadge').classList.add('hidden');
          switchTab('home'); 
        }
      } catch (error) {
        alert("ไม่สามารถดึงข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
      }
      document.getElementById('loading').style.display = 'none';
    }

    function switchTab(tab) {
      const tabHome = document.getElementById('tabHome');
      const tabBooking = document.getElementById('tabBooking');
      
      if (tab === 'home') {
        tabHome.className = "flex-1 flex flex-col items-center p-2 text-blue-600 transition-colors";
        tabHome.querySelector('span').className = "text-[10px] font-bold";
        tabBooking.className = "flex-1 flex flex-col items-center p-2 text-slate-400 hover:text-blue-500 transition-colors relative";
        tabBooking.querySelector('span').className = "text-[10px] font-medium";
        
        document.getElementById('myBookingView').classList.add('hidden');
        document.getElementById('bookingForm').classList.add('hidden');
        document.getElementById('classListView').classList.add('hidden');
        
        renderDayList();
        
      } else if (tab === 'mybooking') {
        tabBooking.className = "flex-1 flex flex-col items-center p-2 text-blue-600 transition-colors relative";
        tabBooking.querySelector('span').className = "text-[10px] font-bold";
        tabHome.className = "flex-1 flex flex-col items-center p-2 text-slate-400 hover:text-blue-500 transition-colors";
        tabHome.querySelector('span').className = "text-[10px] font-medium";
        
        document.getElementById('dayListView').classList.add('hidden');
        document.getElementById('classListView').classList.add('hidden');
        document.getElementById('bookingForm').classList.add('hidden');
        document.getElementById('myBookingView').classList.remove('hidden');
        
        if(!myBookingsData || myBookingsData.length === 0) {
          document.getElementById('emptyBookingState').classList.remove('hidden');
          document.getElementById('myBookingsListState').classList.add('hidden');
          document.getElementById('detailViewWrapper').classList.add('hidden');
        } 
        else if (myBookingsData.length === 1) {
          document.getElementById('emptyBookingState').classList.add('hidden');
          document.getElementById('myBookingsListState').classList.add('hidden');
          document.getElementById('detailViewWrapper').classList.remove('hidden');
          document.getElementById('btnBackToListContainer').classList.add('hidden');
          setupMyBookingData(myBookingsData[0]);
        } 
        else {
          document.getElementById('emptyBookingState').classList.add('hidden');
          document.getElementById('detailViewWrapper').classList.add('hidden');
          document.getElementById('myBookingsListState').classList.remove('hidden');
          renderBookingsList();
        }
      }
    }

    function renderBookingsList() {
      document.getElementById('bookingCountBadge').innerText = `${myBookingsData.length} คลาส`;
      let html = '';
      
      myBookingsData.forEach(booking => {
        let statusColor = (booking.status === "ชำระเงินแล้ว" || booking.status === "จองสำเร็จ") 
                        ? "bg-green-100 text-green-700" : "bg-yellow-100 text-yellow-700";
        
        let showDate = (booking.bookingDate && booking.bookingDate !== "ไม่ระบุ") ? formatThaiDate(booking.bookingDate) : (booking.date || booking.dayOfWeek);

        html += `
          <div onclick="showBookingDetail('${booking.bookingId}')" class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center cursor-pointer hover:border-blue-300 transition group relative overflow-hidden">
            <div class="absolute left-0 top-0 w-1 h-full bg-blue-400"></div>
            <div>
              <h3 class="font-bold text-slate-800 text-sm">${booking.className}</h3>
              <p class="text-xs text-slate-500 mt-1">วันที่ ${showDate} | ${booking.time}</p>
            </div>
            <div class="flex items-center text-right">
              <span class="px-2 py-1 rounded-md text-[10px] font-bold ${statusColor} mr-3">${booking.status}</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300 group-hover:text-blue-500 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </div>
          </div>
        `;
      });
      document.getElementById('bookingsContainer').innerHTML = html;
    }

    function showBookingDetail(bookingId) {
      document.getElementById('myBookingsListState').classList.add('hidden');
      document.getElementById('detailViewWrapper').classList.remove('hidden');
      document.getElementById('btnBackToListContainer').classList.remove('hidden');

      const booking = myBookingsData.find(b => b.bookingId === bookingId);
      if(booking) setupMyBookingData(booking);
    }

    function showBookingsList() {
      document.getElementById('detailViewWrapper').classList.add('hidden');
      document.getElementById('myBookingsListState').classList.remove('hidden');
    }

    function renderDayList() {
      document.getElementById('dayListView').classList.remove('hidden');
      const uniqueDays = [...new Set(allClassData.map(c => c.date))];
      let html = '';
      uniqueDays.forEach(day => {
        const classCount = allClassData.filter(c => c.date === day).length;
        html += `
          <div onclick="showClassesForDay('${day}')" class="min-w-0 bg-white py-4 px-2 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center cursor-pointer active:scale-95 hover:border-blue-400 transition-all text-center">
            <div class="w-11 h-11 bg-blue-50 rounded-full flex items-center justify-center mb-2 text-blue-600 shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            </div>
            <span class="text-sm font-bold text-slate-800 break-words w-full px-1">${day}</span>
            <span class="text-xs text-slate-500 mt-1">${classCount} คลาสเรียน</span>
          </div>
        `;
      });
      document.getElementById('dayContainer').innerHTML = html;
    }

    function showClassesForDay(selectedDay) {
      document.getElementById('dayListView').classList.add('hidden');
      document.getElementById('classListView').classList.remove('hidden');
      
      document.getElementById('selectedDayTitle').innerText = `${selectedDay}`;
      const filteredClasses = allClassData.filter(c => c.date === selectedDay);
      
      let html = '';
      filteredClasses.forEach(c => {
        const isFull = parseInt(c.remaining) <= 0;
        const badgeClass = isFull ? 'text-white bg-red-500' : 'text-white bg-green-500';
          
        html += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <h2 class="text-lg font-bold text-slate-800">${c.className}</h2>
            <p class="text-sm text-slate-500 mt-1.5 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              ${c.time}
            </p>
            
            <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-50 gap-3">
              <span class="text-xs font-bold ${badgeClass} px-3 py-2.5 rounded-xl shadow-sm whitespace-nowrap text-center">
                ${isFull ? 'เต็มแล้ว' : `ว่าง ${c.remaining} ที่`}
              </span>
              <button onclick="openForm('${c.classId}', '${c.className}', '${c.date}', '${c.time}')" ${isFull ? 'disabled' : ''} 
                class="flex-1 flex justify-center items-center ${isFull ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-sm'} py-2.5 rounded-xl text-sm font-medium transition">
                ${isFull ? 'คลาสเต็ม' : 'เลือกคลาสนี้'}
              </button>
            </div>
          </div>
        `;
      });
      document.getElementById('classContainer').innerHTML = html;
    }

    function backToDayList() {
      document.getElementById('classListView').classList.add('hidden');
      document.getElementById('dayListView').classList.remove('hidden');
    }

    function closeForm() {
      document.getElementById('bookingForm').classList.add('hidden');
      document.getElementById('consentCheck').checked = false;
      document.getElementById('classListView').classList.remove('hidden');
    }

    function formatThaiDate(dateStr) {
      if(!dateStr || !dateStr.includes('-')) return dateStr;
      const parts = dateStr.split('-'); 
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function setupMyBookingData(booking) {
      currentBookingId = booking.bookingId;
      document.getElementById('bName').innerText = booking.name;
      document.getElementById('bClassName').innerText = booking.className;
      
      let showDate = (booking.bookingDate && booking.bookingDate !== "ไม่ระบุ") ? formatThaiDate(booking.bookingDate) : (booking.date || booking.dayOfWeek);
      document.getElementById('bSpecificDate').innerText = showDate;
      document.getElementById('bTime').innerText = booking.time;
      
      document.getElementById('editName').value = booking.name;
      let cleanPhone = booking.phone ? booking.phone.replace(/'/g, "") : "";
      document.getElementById('editPhone').value = cleanPhone;
      document.getElementById('editBookingDate').value = booking.bookingDate || "";

      const scheduleSelect = document.getElementById('editClassSchedule');
      scheduleSelect.innerHTML = '';
      const relatedClasses = allClassData.filter(c => c.className === booking.className);
      relatedClasses.forEach(c => {
        const option = document.createElement('option');
        option.value = c.classId;
        option.text = `วัน${c.date} | ${c.time}`;
        if (c.classId === booking.classId) option.selected = true; 
        scheduleSelect.appendChild(option);
      });

      const statusBadge = document.getElementById('bookingStatus');
      statusBadge.innerText = booking.status;
      if(booking.status === "ชำระเงินแล้ว" || booking.status === "จองสำเร็จ") {
        statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 inline-block";
        document.getElementById('btnEdit').classList.add('hidden');
        document.getElementById('btnCancel').classList.add('hidden');
      } else {
        statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700 inline-block";
        document.getElementById('btnEdit').classList.remove('hidden');
        document.getElementById('btnCancel').classList.remove('hidden');
      }
      document.getElementById('editForm').classList.add('hidden'); 
    }

    function openForm(classId, className, date, time) {
      document.getElementById('selectedClassId').value = classId;
      document.getElementById('selectedClassText').innerHTML = `<span class="block text-xs text-slate-500 mb-1">${date} | ${time}</span><b class="text-base text-blue-800">${className}</b>`;
      
      document.getElementById('name').value = savedName;
      document.getElementById('phone').value = savedPhone;
      document.getElementById('bookingDate').value = '';
      document.getElementById('consentCheck').checked = false;

      document.getElementById('classListView').classList.add('hidden');
      document.getElementById('bookingForm').classList.remove('hidden');
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showToast(message) {
      const toast = document.getElementById('toastMessage');
      toast.innerText = message;
      toast.classList.remove('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0');
        toast.classList.add('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
      }, 3000);
    }

    async function submitNewBooking() {
      const checkbox = document.getElementById('consentCheck');
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const bookingDate = document.getElementById('bookingDate').value;
      const classId = document.getElementById('selectedClassId').value;
      
      if(checkbox.checked) {
        if(!name || !phone || !bookingDate) {
          alert("กรุณากรอก ชื่อ เบอร์โทร และ เลือกวันที่ต้องการเรียน ให้ครบถ้วนครับ"); 
          checkbox.checked = false; 
          return;
        }

        const selectedClass = allClassData.find(c => c.classId === classId);
        if (selectedClass) {
          const daysThai = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
          const daysEng = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
          
          const d = new Date(bookingDate);
          const dayIndex = d.getDay();
          const dayNameThai = daysThai[dayIndex];
          const dayNameEng = daysEng[dayIndex];
          
          const classDayStr = selectedClass.date.replace('วัน', '').trim().toUpperCase();
          
          if (!classDayStr.includes(dayNameThai) && !dayNameThai.includes(classDayStr) &&
              !classDayStr.includes(dayNameEng) && !dayNameEng.includes(classDayStr)) {
            alert(`วันที่คุณเลือกไม่ตรงกับตารางเรียน (คลาสนี้เรียนวัน${selectedClass.date}) กรุณาเลือกวันที่ปฏิทินให้ถูกต้องครับ`);
            checkbox.checked = false;
            return;
          }
          
          const isDuplicate = myBookingsData.some(b => 
            b.className === selectedClass.className && 
            b.time === selectedClass.time && 
            b.bookingDate === bookingDate
          );

          if (isDuplicate) {
            alert("คุณมีคลาสเรียนเวลาดังกล่าวแล้ว");
            checkbox.checked = false;
            return;
          }
        }
        
        document.getElementById('loading').style.display = 'flex';
        const payload = { 
          action: "book", 
          uid: userUid, 
          name: name, 
          phone: phone, 
          bookingDate: bookingDate, 
          classId: classId 
        };
        await sendData(payload);
      }
    }

    function toggleEdit() {
      const form = document.getElementById('editForm');
      form.classList.toggle('hidden');
    }

    async function saveEdit() {
      const name = document.getElementById('editName').value;
      const phone = document.getElementById('editPhone').value;
      const classId = document.getElementById('editClassSchedule').value;
      const bookingDate = document.getElementById('editBookingDate').value;

      if(!name || !phone || !bookingDate) return alert("กรุณากรอกข้อมูล วันที่และเวลา ให้ครบถ้วน");

      const selectedClass = allClassData.find(c => c.classId === classId);
      if (selectedClass) {
        const daysThai = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
        const daysEng = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        
        const d = new Date(bookingDate);
        const dayIndex = d.getDay();
        const dayNameThai = daysThai[dayIndex];
        const dayNameEng = daysEng[dayIndex];
        
        const classDayStr = selectedClass.date.replace('วัน', '').trim().toUpperCase();
        
        if (!classDayStr.includes(dayNameThai) && !dayNameThai.includes(classDayStr) &&
            !classDayStr.includes(dayNameEng) && !dayNameEng.includes(classDayStr)) {
          alert(`วันที่คุณเลือกไม่ตรงกับตารางเรียน (คลาสนี้เรียนวัน${selectedClass.date}) กรุณาเลือกวันที่ปฏิทินให้ถูกต้องครับ`);
          return;
        }

        const isDuplicate = myBookingsData.some(b => 
          b.bookingId !== currentBookingId && 
          b.className === selectedClass.className && 
          b.time === selectedClass.time && 
          b.bookingDate === bookingDate
        );

        if (isDuplicate) {
          alert("คุณมีคลาสเรียนเวลาดังกล่าวแล้ว");
          return;
        }
      }
      
      document.getElementById('loading').style.display = 'flex';
      try {
        await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ action: "edit", bookingId: currentBookingId, name, phone, classId, bookingDate }) 
        });
        
        await fetchData(); 
        showToast("✓ บันทึกข้อมูลสำเร็จ");
        
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
        document.getElementById('loading').style.display = 'none';
      }
    }

    async function cancelBooking() {
      if(confirm("คุณต้องการยกเลิกการจองนี้ใช่หรือไม่?")) {
        document.getElementById('loading').style.display = 'flex';
        await sendData({ action: "cancel", bookingId: currentBookingId });
      }
    }

    async function sendData(payload) {
      try {
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        fetchData(); 
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
        document.getElementById('loading').style.display = 'none';
      }
    }

    main();
  </script>
</body>
</html>
