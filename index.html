<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จองคลาสเรียน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-50 p-4">

  <div class="max-w-md mx-auto text-center mb-6">
    <h1 class="text-2xl font-bold text-blue-700">จองคลาสเรียน</h1>
    <p id="profileName" class="text-sm text-gray-500 mt-1">กำลังโหลดข้อมูล...</p>
  </div>

  <!-- จุดแสดงคลาสเรียน -->
  <div id="classContainer" class="max-w-md mx-auto space-y-4">
    <p class="text-center text-gray-500">กำลังดึงข้อมูลคลาสเรียน...</p>
  </div>

  <!-- ฟอร์มจอง -->
  <div id="bookingForm" class="max-w-md mx-auto mt-8 bg-white p-5 rounded-xl shadow-sm border hidden">
    <h3 class="font-bold mb-4 text-blue-800">ข้อมูลผู้จอง <span id="selectedClassText" class="text-sm text-gray-500 block"></span></h3>
    <input type="hidden" id="selectedClassId">
    <input type="text" id="name" placeholder="ชื่อ - นามสกุล" class="w-full mb-3 px-4 py-2 border rounded">
    <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์" class="w-full mb-4 px-4 py-2 border rounded">
    
    <label class="flex items-start space-x-3 cursor-pointer bg-gray-50 p-3 rounded border">
      <input type="checkbox" id="consentCheck" onchange="submitBooking()" class="mt-1 w-5 h-5 text-blue-600">
      <span class="text-sm text-gray-600">ข้าพเจ้าตรวจสอบข้อมูลและยืนยันการจอง</span>
    </label>
  </div>

  <script>
    // ----------------------------------------------------
    // [แก้ไขตรงนี้] ใส่ข้อมูลของคุณที่ได้จาก Phase 2 และ 3
    const GAS_URL = "https://script.google.com/macros/s/AKfycbywdBJxTfFqr4f311o2L7fhywrmKVzC4HLDNzOFU3fLCLsqNyhwmRBBx4l49MFqSdjA/exec";
    const LIFF_ID = "2009934915-533SfMV4";
    // ----------------------------------------------------

    let userUid = "";

    // 1. เริ่มต้นการทำงาน LIFF
    async function main() {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userUid = profile.userId;
        document.getElementById('profileName').innerText = `สวัสดีคุณ ${profile.displayName}`;
        fetchClasses(); // ไปดึงข้อมูลคลาส
      } else {
        liff.login();
      }
    }

    // 2. ดึงข้อมูลจาก GAS มาสร้าง Card
    async function fetchClasses() {
      try {
        const response = await fetch(GAS_URL);
        const classes = await response.json();
        
        let html = '';
        classes.forEach(c => {
          html += `
            <div class="bg-white p-4 rounded-xl shadow-sm border border-l-4 border-l-blue-500">
              <span class="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded">${c.date}</span>
              <h2 class="text-lg font-bold mt-2">${c.className}</h2>
              <p class="text-sm text-gray-600 mb-2">🕒 ${c.time}</p>
              <div class="flex justify-between items-center">
                <span class="text-sm">ว่าง <b>${c.remaining}</b> ที่นั่ง</span>
                <button onclick="openForm('${c.classId}', '${c.className}')" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">จอง</button>
              </div>
            </div>
          `;
        });
        document.getElementById('classContainer').innerHTML = html;
      } catch (error) {
        document.getElementById('classContainer').innerHTML = '<p class="text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
      }
    }

    // 3. เปิดฟอร์ม
    function openForm(classId, className) {
      document.getElementById('selectedClassId').value = classId;
      document.getElementById('selectedClassText').innerText = `(คลาส: ${className})`;
      document.getElementById('bookingForm').classList.remove('hidden');
      document.getElementById('bookingForm').scrollIntoView({ behavior: 'smooth' });
    }

    // 4. ส่งข้อมูลกลับไปบันทึกที่ GAS (Auto-Submit)
    async function submitBooking() {
      const checkbox = document.getElementById('consentCheck');
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const classId = document.getElementById('selectedClassId').value;

      if(checkbox.checked) {
        if(!name || !phone) {
          alert("กรุณากรอกข้อมูลให้ครบถ้วน");
          checkbox.checked = false;
          return;
        }

        // ปิดการติ๊กชั่วคราวกันกดซ้ำ
        checkbox.disabled = true;
        alert("กำลังบันทึกข้อมูลการจอง กรุณารอสักครู่...");

        const payload = { uid: userUid, name: name, phone: phone, classId: classId };

        try {
          // ยิง POST Request ไปที่ GAS
          const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(payload)
          });
          
          const result = await response.json();
          if(result.status === "success") {
            alert("จองสำเร็จ! (รอรับข้อความยืนยันทางแชท)");
            liff.closeWindow(); // ปิดหน้าต่าง LIFF กลับไปที่แชท
          }
        } catch (error) {
          alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
          checkbox.checked = false;
          checkbox.disabled = false;
        }
      }
    }

    // เริ่มทำงาน
    main();
  </script>
</body>
</html>
