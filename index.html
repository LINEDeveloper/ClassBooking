<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการคลาสเรียน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { background-color: #f8fafc; }
  </style>
</head>
<body class="font-sans text-slate-800 p-4">

  <!-- Loading State -->
  <div id="loading" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <!-- Header & Profile -->
  <div class="max-w-md mx-auto mb-6 flex items-center space-x-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
    <img id="profileImage" src="" alt="Profile" class="w-14 h-14 rounded-full border-2 border-blue-100 object-cover hidden">
    <div>
      <h1 class="text-xl font-bold text-slate-900 tracking-tight">Class <span class="text-blue-600">Booking</span></h1>
      <p id="profileName" class="text-sm text-slate-500 mt-0.5">กำลังโหลดข้อมูล...</p>
    </div>
  </div>

  <!-- VIEW 1: My Booking (แสดงเมื่อมีประวัติจอง) -->
  <div id="myBookingView" class="max-w-md mx-auto hidden">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
      <div class="h-1 w-full bg-gradient-to-r from-blue-500 to-red-500"></div>
      <div class="p-6">
        <div class="flex justify-between items-start mb-4">
          <h2 class="text-lg font-bold text-slate-800">การจองของคุณ</h2>
          <span id="bookingStatus" class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700">รอชำระเงิน</span>
        </div>
        
        <div class="space-y-3 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
          <p class="text-sm"><span class="text-slate-500 block text-xs">คลาสเรียน</span> <span id="bClassName" class="font-semibold text-blue-700"></span></p>
          <div class="flex gap-4">
            <p class="text-sm"><span class="text-slate-500 block text-xs">วันที่</span> <span id="bDate" class="font-medium"></span></p>
            <p class="text-sm"><span class="text-slate-500 block text-xs">เวลา</span> <span id="bTime" class="font-medium"></span></p>
          </div>
        </div>

        <div id="editForm" class="hidden space-y-3 mb-4">
          <input type="text" id="editName" class="w-full px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="ชื่อ-สกุล">
          <input type="tel" id="editPhone" class="w-full px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="เบอร์โทร">
          <button onclick="saveEdit()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium">บันทึกข้อมูล</button>
        </div>

        <div class="flex gap-2">
          <button id="btnEdit" onclick="toggleEdit()" class="flex-1 bg-white border border-slate-300 text-slate-700 py-2 rounded-lg text-sm font-medium hover:bg-slate-50">แก้ไขข้อมูล</button>
          <button id="btnCancel" onclick="cancelBooking()" class="flex-1 bg-red-50 text-red-600 py-2 rounded-lg text-sm font-medium hover:bg-red-100">ยกเลิก</button>
        </div>
      </div>
    </div>
  </div>

  <!-- VIEW 2: Class List (แสดงเมื่อไม่มีประวัติ) -->
  <div id="classListView" class="max-w-md mx-auto hidden">
    <div id="classContainer" class="space-y-4"></div>
  </div>

  <!-- ฟอร์มจอง (บันทึกอัตโนมัติเมื่อกด Checkbox) -->
  <div id="bookingForm" class="max-w-md mx-auto mt-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden">
    <h3 class="font-bold text-lg mb-1 text-slate-800">ยืนยันการจอง</h3>
    <p id="selectedClassText" class="text-sm text-blue-600 font-medium mb-4"></p>
    <input type="hidden" id="selectedClassId">
    
    <input type="text" id="name" placeholder="ชื่อ - นามสกุล" class="w-full mb-3 px-4 py-3 bg-slate-50 border-transparent rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
    <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์ติดต่อ" class="w-full mb-4 px-4 py-3 bg-slate-50 border-transparent rounded-xl text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
    
    <label class="flex items-start space-x-3 cursor-pointer p-4 bg-slate-50 rounded-xl border border-slate-200">
      <input type="checkbox" id="consentCheck" onchange="submitNewBooking()" class="mt-0.5 w-5 h-5 text-blue-600 rounded">
      <span class="text-sm text-slate-600 leading-tight">ข้าพเจ้าตรวจสอบข้อมูลเรียบร้อยแล้ว ยืนยันการจองทันที</span>
    </label>
  </div>

  <script>
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbywdBJxTfFqr4f311o2L7fhywrmKVzC4HLDNzOFU3fLCLsqNyhwmRBBx4l49MFqSdjA/exec"; 
    const LIFF_ID = "2009934915-533SfMV4"; 
    // ==========================================

    let userUid = "";
    let currentBookingId = "";

    async function main() {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userUid = profile.userId;
        
        document.getElementById('profileName').innerText = `สวัสดีคุณ ${profile.displayName}`;
        const profileImg = document.getElementById('profileImage');
        profileImg.src = profile.pictureUrl || "https://cdn-icons-png.flaticon.com/512/847/847969.png"; 
        profileImg.classList.remove('hidden');
        
        fetchData(); 
      } else {
        liff.login();
      }
    }

    async function fetchData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        const response = await fetch(`${GAS_URL}?uid=${userUid}`);
        const data = await response.json();
        
        if (data.booking) {
          showMyBooking(data.booking);
        } else {
          renderClassList(data.classes);
        }
      } catch (error) {
        alert("ไม่สามารถดึงข้อมูลได้");
      }
      document.getElementById('loading').style.display = 'none';
    }

    function showMyBooking(booking) {
      document.getElementById('classListView').classList.add('hidden');
      document.getElementById('bookingForm').classList.add('hidden');
      document.getElementById('myBookingView').classList.remove('hidden');
      
      currentBookingId = booking.bookingId;
      document.getElementById('bClassName').innerText = booking.className;
      document.getElementById('bDate').innerText = booking.date;
      document.getElementById('bTime').innerText = booking.time;
      document.getElementById('editName').value = booking.name;
      document.getElementById('editPhone').value = booking.phone;

      const statusBadge = document.getElementById('bookingStatus');
      statusBadge.innerText = booking.status;
      if(booking.status === "ชำระเงินแล้ว" || booking.status === "จองสำเร็จ") {
        statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700";
        document.getElementById('btnEdit').classList.add('hidden');
        document.getElementById('btnCancel').classList.add('hidden');
      }
    }

    function renderClassList(classes) {
      document.getElementById('myBookingView').classList.add('hidden');
      document.getElementById('classListView').classList.remove('hidden');
      
      let html = '';
      classes.forEach(c => {
        const isFull = parseInt(c.remaining) <= 0;
        html += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden">
            <span class="absolute top-5 right-5 text-xs font-bold ${isFull ? 'text-red-500 bg-red-50' : 'text-blue-600 bg-blue-50'} px-2 py-1 rounded-md">
              ${isFull ? 'เต็มแล้ว' : `ว่าง ${c.remaining} ที่`}
            </span>
            <span class="text-xs font-semibold text-slate-500 tracking-wide">${c.date}</span>
            <h2 class="text-lg font-bold text-slate-800 mt-1">${c.className}</h2>
            <p class="text-sm text-slate-500 mt-1 mb-4">🕒 ${c.time}</p>
            <button onclick="openForm('${c.classId}', '${c.className}')" ${isFull ? 'disabled' : ''} 
              class="w-full ${isFull ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white'} py-2.5 rounded-xl text-sm font-medium transition">
              ${isFull ? 'คลาสเต็ม' : 'เลือกคลาสนี้'}
            </button>
          </div>
        `;
      });
      document.getElementById('classContainer').innerHTML = html;
    }

    function openForm(classId, className) {
      document.getElementById('selectedClassId').value = classId;
      document.getElementById('selectedClassText').innerText = className;
      document.getElementById('bookingForm').classList.remove('hidden');
      document.getElementById('bookingForm').scrollIntoView({ behavior: 'smooth' });
    }

    async function submitNewBooking() {
      const checkbox = document.getElementById('consentCheck');
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      
      if(checkbox.checked) {
        if(!name || !phone) {
          alert("กรุณากรอกข้อมูลให้ครบถ้วน"); checkbox.checked = false; return;
        }
        document.getElementById('loading').style.display = 'flex';
        const payload = { action: "book", uid: userUid, name, phone, classId: document.getElementById('selectedClassId').value };
        await sendData(payload);
      }
    }

    function toggleEdit() {
      document.getElementById('editForm').classList.toggle('hidden');
    }

    async function saveEdit() {
      const name = document.getElementById('editName').value;
      const phone = document.getElementById('editPhone').value;
      if(!name || !phone) return alert("กรุณากรอกข้อมูลให้ครบ");
      
      document.getElementById('loading').style.display = 'flex';
      await sendData({ action: "edit", bookingId: currentBookingId, name, phone });
    }

    async function cancelBooking() {
      if(confirm("คุณต้องการยกเลิกการจองนี้ใช่หรือไม่?")) {
        document.getElementById('loading').style.display = 'flex';
        await sendData({ action: "cancel", bookingId: currentBookingId });
      }
    }

    async function sendData(payload) {
      try {
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        fetchData(); 
      } catch (error) {
        alert("เกิดข้อผิดพลาด");
        document.getElementById('loading').style.display = 'none';
      }
    }

    main();
  </script>
</body>
</html>
