<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoka Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .modal-enter { opacity: 1 !important; visibility: visible !important; }
    .modal-content-enter { transform: scale(1) !important; }
  </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

  <div id="loginView" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center transition-opacity duration-300">
    <div class="bg-white p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-full max-w-sm">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-pink-50 rounded-full flex items-center justify-center mx-auto mb-4 text-pink-500">
          <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-pink-500 to-red-500 text-transparent bg-clip-text">Yoka Admin</h1>
        <p class="text-sm text-slate-400 mt-1">ระบบจัดการหลังบ้าน</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Username</label>
          <input type="text" id="username" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-pink-400 focus:ring-1 outline-none" placeholder="admin">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Password</label>
          <input type="password" id="password" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-pink-400 focus:ring-1 outline-none" placeholder="••••••••">
        </div>
        <button onclick="login()" id="btnLogin" class="w-full bg-gradient-to-r from-pink-500 to-red-500 text-white font-bold py-3.5 rounded-xl shadow-md hover:opacity-90 transition mt-2 active:scale-95">
          เข้าสู่ระบบ
        </button>
      </div>
    </div>
  </div>

  <div id="dashboardView" class="hidden flex flex-col h-full opacity-0 transition-opacity duration-300">
    <nav class="bg-white px-6 py-4 flex justify-between items-center shrink-0 border-b border-slate-100">
      <div class="flex items-center space-x-3">
        <div class="w-8 h-8 bg-gradient-to-r from-pink-500 to-red-500 rounded-lg flex items-center justify-center text-white font-bold">Y</div>
        <span class="font-bold text-lg text-slate-800 tracking-tight">Yoka Dashboard</span>
      </div>
      <button onclick="logout()" class="text-sm font-medium text-slate-500 hover:text-red-500 flex items-center transition">
        <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg> ออกจากระบบ
      </button>
    </nav>

    <div class="bg-white px-6 border-b border-slate-200 flex space-x-6 shrink-0 shadow-sm">
      <button id="tabMembers" onclick="switchTab('members')" class="py-3 border-b-2 border-pink-500 text-pink-600 font-bold text-sm transition">จัดการแพ็กเกจ & สลิป</button>
      <button id="tabBookings" onclick="switchTab('bookings')" class="py-3 border-b-2 border-transparent text-slate-500 hover:text-pink-500 font-bold text-sm transition">รายการจองคลาส</button>
    </div>

    <div class="flex-1 overflow-auto p-6 md:p-8 relative bg-slate-50/50">
      
      <div class="max-w-[1400px] mx-auto transition-opacity duration-300">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center">
            <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mr-4"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>
            <div><p class="text-sm text-slate-500 font-medium">รอตรวจสลิป (สมาชิก)</p><p class="text-2xl font-bold text-slate-800" id="statWaitSlip">0</p></div>
          </div>
          <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center">
            <div class="w-12 h-12 rounded-full bg-green-50 text-green-500 flex items-center justify-center mr-4"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></div>
            <div><p class="text-sm text-slate-500 font-medium">สมาชิก (ใช้งานได้)</p><p class="text-2xl font-bold text-slate-800" id="statActiveMem">0</p></div>
          </div>
          <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center">
            <div class="w-12 h-12 rounded-full bg-pink-50 text-pink-500 flex items-center justify-center mr-4"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>
            <div><p class="text-sm text-slate-500 font-medium">ยอดจองคลาส</p><p class="text-2xl font-bold text-slate-800" id="statBookings">0</p></div>
          </div>
          <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center">
            <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center mr-4"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>
            <div><p class="text-sm text-slate-500 font-medium">เข้าเรียนแล้ว</p><p class="text-2xl font-bold text-slate-800" id="statCheckIn">0</p></div>
          </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
          <div class="p-5 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center bg-white gap-4">
            <h2 id="tableTitle" class="font-bold text-lg text-slate-800">รายการสมัครแพ็กเกจ (รอตรวจสลิป)</h2>
            <button onclick="fetchAdminData()" class="bg-slate-100 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-200 transition">🔄 รีเฟรชข้อมูล</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[1000px]">
              <thead id="tableHeader" class="bg-slate-50/50 text-xs text-slate-400 uppercase tracking-wider border-b border-slate-100">
                </thead>
              <tbody id="tableBody" class="text-sm text-slate-700">
                <tr><td colspan="8" class="text-center p-8 text-slate-400">กรุณาล็อกอินเพื่อโหลดข้อมูล...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="slipModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 opacity-0 invisible transition-all duration-300">
    <div id="slipModalContent" class="bg-white rounded-3xl shadow-2xl w-full max-w-3xl flex flex-col md:flex-row overflow-hidden transform scale-95 transition-all duration-300">
      <div class="w-full md:w-1/2 bg-slate-100 p-4 flex items-center justify-center border-r border-slate-100 relative min-h-[300px]">
        <p class="absolute top-4 left-4 bg-black/50 text-white text-xs px-3 py-1 rounded-full">รูปภาพสลิป</p>
        <img id="modalSlipImg" src="" class="max-h-[60vh] object-contain rounded-lg shadow-sm" alt="Slip">
      </div>
      <div class="w-full md:w-1/2 p-6 md:p-8 flex flex-col">
        <div class="flex justify-between items-start mb-6">
          <div><h3 class="text-xl font-bold text-slate-800">อนุมัติแพ็กเกจสมาชิก</h3></div>
          <button onclick="closeSlipModal()" class="text-slate-400 hover:text-red-500 bg-slate-50 p-2 rounded-full transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <div class="bg-slate-50 rounded-2xl p-5 mb-8 border border-slate-100 space-y-3">
          <input type="hidden" id="modalLineId">
          <div class="flex justify-between border-b border-slate-200 pb-2"><span class="text-slate-500 text-sm">ชื่อลูกค้า</span><span id="modalCusName" class="font-bold text-slate-800"></span></div>
          <div class="flex justify-between border-b border-slate-200 pb-2"><span class="text-slate-500 text-sm">แพ็กเกจที่เลือก</span><span id="modalPkgName" class="font-bold text-pink-600"></span></div>
          <div class="flex justify-between border-b border-slate-200 pb-2"><span class="text-slate-500 text-sm">สิทธิ์ที่จะได้รับ</span><span id="modalCredits" class="font-bold text-slate-800"></span></div>
        </div>
        <div class="mt-auto space-y-3">
          <button onclick="approveMember('ใช้งานได้')" id="btnApprove" class="w-full bg-green-500 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-green-600 transition">✅ อนุมัติสลิป (เพิ่มสิทธิ์ให้ลูกค้า)</button>
          <button onclick="approveMember('สลิปไม่ถูกต้อง')" id="btnReject" class="w-full bg-white border border-red-200 text-red-500 font-bold py-3.5 rounded-xl hover:bg-red-50 transition">❌ สลิปไม่ถูกต้อง (ปฏิเสธ)</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚙️ URL API (ใช้ Web App URL ของคุณ)
    const API_URL = "https://script.google.com/macros/s/AKfycbywdBJxTfFqr4f311o2L7fhywrmKVzC4HLDNzOFU3fLCLsqNyhwmRBBx4l49MFqSdjA/exec";
    
    let currentTab = 'members';
    let membersData = [];
    let bookingsData = [];

    // --- ระบบ Login ---
    function login() {
      document.getElementById('loginView').classList.add('opacity-0');
      setTimeout(() => {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
        setTimeout(() => document.getElementById('dashboardView').classList.remove('opacity-0'), 50);
        fetchAdminData(); 
      }, 300);
    }

    function logout() { location.reload(); }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabMembers').className = tab === 'members' ? "py-3 border-b-2 border-pink-500 text-pink-600 font-bold text-sm transition" : "py-3 border-b-2 border-transparent text-slate-500 hover:text-pink-500 font-bold text-sm transition";
      document.getElementById('tabBookings').className = tab === 'bookings' ? "py-3 border-b-2 border-pink-500 text-pink-600 font-bold text-sm transition" : "py-3 border-b-2 border-transparent text-slate-500 hover:text-pink-500 font-bold text-sm transition";
      document.getElementById('tableTitle').innerText = tab === 'members' ? "รายการสมัครแพ็กเกจ (สมาชิก)" : "รายการจองคลาส";
      renderTable();
    }

    // --- 📡 ดึงข้อมูลรายการจาก GAS ---
    async function fetchAdminData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="8" class="text-center p-8 text-slate-400 font-medium animate-pulse">กำลังซิงค์ข้อมูลจาก Google Sheet...</td></tr>';
      
      try {
        // ใช้ action ใหม่ที่รวมข้อมูลทั้ง Members และ Bookings
        const response = await fetch(API_URL + "?action=get_admin_data");
        const result = await response.json();
        
        if (result.status === "success") {
          membersData = result.members || [];
          bookingsData = result.bookings || [];
          updateStats();
          renderTable();
        }
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center p-8 text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล โปรดลองใหม่</td></tr>';
      }
    }

    function updateStats() {
      let waitSlip = membersData.filter(m => m.status === "รอตรวจสอบสลิป").length;
      let activeMem = membersData.filter(m => m.status === "ใช้งานได้").length;
      let totalBookings = bookingsData.filter(b => b.status === "จองสำเร็จ").length;
      let checkedIn = bookingsData.filter(b => b.checkInStatus === "เข้าเรียนแล้ว" || b.checkInStatus === "✅").length;

      document.getElementById('statWaitSlip').innerText = waitSlip;
      document.getElementById('statActiveMem').innerText = activeMem;
      document.getElementById('statBookings').innerText = totalBookings;
      document.getElementById('statCheckIn').innerText = checkedIn;
    }

    function renderTable() {
      const thead = document.getElementById('tableHeader');
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = "";

      if (currentTab === 'members') {
        // --- ส่วนแสดงตารางสมาชิก (ตรวจสลิป) ---
        thead.innerHTML = `
          <tr>
            <th class="p-4 font-semibold">วันที่สมัคร</th>
            <th class="p-4 font-semibold">ชื่อ-นามสกุล</th>
            <th class="p-4 font-semibold">เบอร์ติดต่อ</th>
            <th class="p-4 font-semibold">แพ็กเกจ</th>
            <th class="p-4 font-semibold text-center">สิทธิ์คงเหลือ</th>
            <th class="p-4 font-semibold text-center">สถานะ</th>
            <th class="p-4 font-semibold text-center">จัดการ</th>
          </tr>
        `;
        if(membersData.length === 0) return tbody.innerHTML = '<tr><td colspan="7" class="text-center p-8 text-slate-400">ยังไม่มีข้อมูลสมาชิก</td></tr>';
        
        membersData.forEach(item => {
          let statusBadge = `<span class="px-3 py-1 rounded-full text-[11px] font-bold bg-slate-100 text-slate-500">${item.status}</span>`;
          let actionBtn = `<span class="text-slate-300 text-xs">-</span>`;
          
          if (item.status === "รอตรวจสอบสลิป") {
            statusBadge = `<span class="px-3 py-1 rounded-full text-[11px] font-bold bg-blue-100 text-blue-600">รอตรวจสอบสลิป</span>`;
            const slipUrl = item.slipUrl || "https://via.placeholder.com/400x600?text=No+Slip+Image";
            actionBtn = `<button onclick="openSlipModal('${item.lineId}', '${item.name}', '${item.package}', '${item.totalCredit}', '${slipUrl}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition shadow-sm">ตรวจสลิป</button>`;
          } 
          else if (item.status === "ใช้งานได้") {
            statusBadge = `<span class="px-3 py-1 rounded-full text-[11px] font-bold bg-green-100 text-green-600">ใช้งานได้</span>`;
          }

          tbody.innerHTML += `
            <tr class="border-b border-slate-50 hover:bg-slate-50/80 transition">
              <td class="p-4 text-slate-500 text-sm">${item.date}</td>
              <td class="p-4 font-bold text-slate-800">${item.name}</td>
              <td class="p-4 text-slate-600 font-mono text-sm">${item.phone}</td>
              <td class="p-4 text-pink-600 font-bold text-sm">${item.package}</td>
              <td class="p-4 text-center font-bold text-slate-700">${item.remainingCredit} / ${item.totalCredit}</td>
              <td class="p-4 text-center">${statusBadge}</td>
              <td class="p-4 text-center">${actionBtn}</td>
            </tr>
          `;
        });
      } 
      else {
        // --- ส่วนแสดงตารางการจองคลาส ---
        thead.innerHTML = `
          <tr>
            <th class="p-4 font-semibold">Booking ID</th>
            <th class="p-4 font-semibold">ชื่อ-นามสกุล</th>
            <th class="p-4 font-semibold">คลาสเรียน</th>
            <th class="p-4 font-semibold">วันที่เรียน</th>
            <th class="p-4 font-semibold text-center">สถานะการจอง</th>
            <th class="p-4 font-semibold text-center">การเข้าเรียน</th>
            <th class="p-4 font-semibold text-center">จัดการ</th>
          </tr>
        `;
        if(bookingsData.length === 0) return tbody.innerHTML = '<tr><td colspan="7" class="text-center p-8 text-slate-400">ยังไม่มีการจองคลาส</td></tr>';

        bookingsData.forEach(item => {
          let statusBadge = item.status === "ยกเลิก" ? `<span class="px-3 py-1 rounded-full text-[11px] font-bold bg-red-100 text-red-600">ยกเลิก</span>` : `<span class="px-3 py-1 rounded-full text-[11px] font-bold bg-green-100 text-green-600">${item.status}</span>`;
          
          let checkInUI = `<span class="px-2.5 py-1 rounded-md bg-slate-100 text-slate-400 text-[11px] font-medium">-</span>`;
          if (item.checkInStatus === "เข้าเรียนแล้ว" || item.checkInStatus === "✅") {
            checkInUI = `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-emerald-50 text-emerald-600 text-[10px] font-bold border border-emerald-100"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>เช็คอินแล้ว</span>`;
          }

          let actionBtn = `<button onclick="cancelBookingFast('${item.bookingId}')" class="text-slate-400 hover:text-red-500 px-3 py-1 text-xs underline font-medium">ยกเลิกคิว</button>`;
          if(item.status === "ยกเลิก") actionBtn = "-";

          tbody.innerHTML += `
            <tr class="border-b border-slate-50 hover:bg-slate-50/80 transition">
              <td class="p-4 font-mono text-slate-500 font-medium">${item.bookingId}</td>
              <td class="p-4 font-bold text-slate-800">${item.name}</td>
              <td class="p-4 text-pink-600 font-bold text-sm">${item.className}</td>
              <td class="p-4 text-slate-600 text-sm">${item.bookingDate} <br><span class="text-xs text-slate-400">${item.time}</span></td>
              <td class="p-4 text-center">${statusBadge}</td>
              <td class="p-4 text-center">${checkInUI}</td>
              <td class="p-4 text-center">${actionBtn}</td>
            </tr>
          `;
        });
      }
    }

    // --- ระบบตรวจสอบสลิปแพ็กเกจ (Members) ---
    function openSlipModal(lineId, cusName, pkgName, credits, imgUrl) {
      document.getElementById('modalLineId').value = lineId;
      document.getElementById('modalCusName').innerText = cusName;
      document.getElementById('modalPkgName').innerText = pkgName;
      document.getElementById('modalCredits').innerText = credits + " ครั้ง";
      document.getElementById('modalSlipImg').src = imgUrl;
      
      const m = document.getElementById('slipModal');
      const c = document.getElementById('slipModalContent');
      m.classList.add('modal-enter'); c.classList.add('modal-content-enter');
    }

    function closeSlipModal() {
      document.getElementById('slipModal').classList.remove('modal-enter');
      document.getElementById('slipModalContent').classList.remove('modal-content-enter');
    }

    async function approveMember(newStatus) {
      const lineId = document.getElementById('modalLineId').value;
      document.getElementById('btnApprove').innerText = "กำลังบันทึก...";
      
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: "approve_member", lineId: lineId, status: newStatus })
        });
        closeSlipModal();
        fetchAdminData(); 
        document.getElementById('btnApprove').innerText = "✅ อนุมัติสลิป (เพิ่มสิทธิ์ให้ลูกค้า)";
      } catch(e) { alert("เกิดข้อผิดพลาด"); document.getElementById('btnApprove').innerText = "✅ อนุมัติสลิป"; }
    }

    async function cancelBookingFast(bookingId) {
      if(!confirm(`ต้องการยกเลิกคิวจองรหัส ${bookingId} ใช่หรือไม่?`)) return;
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: "cancel", bookingId: bookingId })
        });
        fetchAdminData();
      } catch(e) {}
    }
  </script>
</body>
</html>
